{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <section class="card lg:col-span-1">
    <div class="cardLabel">User</div>
    <div class="mt-3 text-lg font-semibold">{{ profile_user.display_name or profile_user.username }}</div>
    <div class="text-sm text-slate-600">@{{ profile_user.username }} · {{ profile_user.role }}</div>
    <div class="text-sm text-slate-500 mt-2">{{ profile_user.email or 'No email set' }}</div>
  </section>
  <section class="card lg:col-span-2">
    <div class="cardLabel">Preferences</div>
    <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-3">
      <label class="text-sm">Default chart days
        <input id="prefDays" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2" value="{{ preferences.get('default_history_days', 180) }}" />
      </label>
      <label class="text-sm">Theme
        <input id="prefTheme" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2" value="{{ preferences.get('theme', 'light') }}" />
      </label>
    </div>
    <button id="savePrefs" class="btn mt-4">Save preferences</button>
    <div id="prefMsg" class="mt-2 text-sm"></div>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('savePrefs').addEventListener('click', async () => {
  const preferences = {
    default_history_days: document.getElementById('prefDays').value,
    theme: document.getElementById('prefTheme').value,
  };
  const msg = document.getElementById('prefMsg');
  msg.textContent = 'Saving...';
  try {
    await fetchJSON('/api/preferences', { method: 'POST', body: JSON.stringify({ preferences }) });
    msg.className = 'mt-2 text-sm text-emerald-700';
    msg.textContent = 'Saved';
  } catch (err) {
    msg.className = 'mt-2 text-sm text-rose-700';
    msg.textContent = err.message || 'Failed';
  }
});
</script>
{% endblock %}
