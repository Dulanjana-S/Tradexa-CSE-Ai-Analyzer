{% extends "base.html" %}
{% block content %}

<div class="flex flex-col gap-6">
  <section class="card">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold">Screener</h1>
        <div class="text-sm text-slate-600 mt-1">
          Filter and sort stocks by liquidity and daily movement (synthetic demo).
        </div>
      </div>
      <div class="text-xs text-slate-500">
        Tip: click a symbol to open the stock page.
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mt-6">
      <div>
        <label class="label">Sector</label>
        <select id="sectorSel" class="select w-full">
          <option value="">All</option>
        </select>
      </div>
      <div>
        <label class="label">Min volume</label>
        <input id="minVol" class="input w-full" type="number" min="0" placeholder="e.g., 100000" />
      </div>
      <div>
        <label class="label">Min % change</label>
        <input id="minChg" class="input w-full" type="number" step="0.1" placeholder="-10" value="-100" />
      </div>
      <div>
        <label class="label">Max % change</label>
        <input id="maxChg" class="input w-full" type="number" step="0.1" placeholder="10" value="100" />
      </div>
    </div>

    <div class="mt-4 flex items-center gap-2">
      <button id="applyBtn" class="btn">Apply filters</button>
      <button id="resetBtn" class="btnSecondary">Reset</button>
      <div class="text-sm text-slate-600 ml-auto">
        <span id="countLbl">—</span>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="flex items-center justify-between">
      <div>
        <div class="cardLabel">Results</div>
        <div class="text-sm text-slate-600">Sorted by turnover proxy by default</div>
      </div>
      <button id="exportBtn" class="btnSecondary">Export CSV</button>
    </div>

    <div class="mt-3 overflow-x-auto">
      <table class="table" id="resultsTbl"></table>
    </div>
  </section>
</div>

{% endblock %}

{% block scripts %}
<script>
  (function () {
    const sectorSel = document.getElementById("sectorSel");
    const minVol = document.getElementById("minVol");
    const minChg = document.getElementById("minChg");
    const maxChg = document.getElementById("maxChg");
    const countLbl = document.getElementById("countLbl");

    let lastResults = [];

    function loadSectors(stocks) {
      const sectors = [...new Set(stocks.map(s => s.sector))].sort();
      sectors.forEach(sec => {
        const opt = document.createElement("option");
        opt.value = sec;
        opt.textContent = sec;
        sectorSel.appendChild(opt);
      });
    }

    function renderTable(rows) {
      const tbl = document.getElementById("resultsTbl");
      tbl.innerHTML = "";

      const thead = document.createElement("thead");
      thead.innerHTML = `
        <tr>
          <th>Symbol</th>
          <th>Name</th>
          <th>Sector</th>
          <th class="text-right">Last</th>
          <th class="text-right">Change</th>
          <th class="text-right">Volume</th>
          <th class="text-right">Turnover</th>
        </tr>
      `;
      tbl.appendChild(thead);

      const tbody = document.createElement("tbody");
      rows.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><a class="link" href="/stock/${encodeURIComponent(r.symbol)}">${escapeHtml(r.symbol)}</a></td>
          <td>${escapeHtml(r.name)}</td>
          <td>${escapeHtml(r.sector)}</td>
          <td class="text-right">${fmtMoney(r.last)}</td>
          <td class="text-right">${fmtChangeInline(r.change, r.change_pct)}</td>
          <td class="text-right">${fmtInt(r.volume)}</td>
          <td class="text-right">${fmtLKR(Math.round(r.last * r.volume))}</td>
        `;
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
    }

    function apply() {
      const params = new URLSearchParams();
      if (sectorSel.value) params.set("sector", sectorSel.value);
      if (minVol.value) params.set("min_volume", minVol.value);
      if (minChg.value) params.set("min_change_pct", minChg.value);
      if (maxChg.value) params.set("max_change_pct", maxChg.value);

      fetchJSON("/api/screener?" + params.toString()).then((resp) => {
        lastResults = resp.results || [];
        renderTable(lastResults);
        countLbl.textContent = `${resp.count} stocks`;
      });
    }

    // Initial load
    fetchJSON("/api/stocks").then((resp) => {
      const stocks = resp.stocks || [];
      loadSectors(stocks);
      lastResults = stocks;
      renderTable(stocks);
      countLbl.textContent = `${stocks.length} stocks`;
    });

    document.getElementById("applyBtn").addEventListener("click", apply);
    document.getElementById("resetBtn").addEventListener("click", () => {
      sectorSel.value = "";
      minVol.value = "";
      minChg.value = "-100";
      maxChg.value = "100";
      apply();
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      if (!lastResults.length) return toast("No rows to export.");
      const headers = ["symbol","name","sector","last","change","change_pct","volume"];
      const csv = [
        headers.join(","),
        ...lastResults.map(r => headers.map(h => JSON.stringify(r[h] ?? "")).join(",")),
      ].join("\n");
      downloadText("cse_screener.csv", csv);
    });
  })();
</script>
{% endblock %}
