{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto card">
  <div class="cardLabel">Login</div>
  <h1 class="text-2xl font-semibold mt-1">Sign in to CSE AI Analyzer</h1>
  <div class="text-sm text-slate-600 mt-1">Use your user account or the bootstrap admin account.</div>
  <div class="mt-5 space-y-3">
    <input id="username" class="w-full rounded-xl border border-slate-200 px-3 py-2" placeholder="Username" />
    <input id="password" type="password" class="w-full rounded-xl border border-slate-200 px-3 py-2" placeholder="Password" />
    <button id="loginBtn" class="btn w-full">Login</button>
    <div id="loginMsg" class="text-sm"></div>
    <div class="text-xs text-slate-500">Default bootstrap admin: <span class="font-medium">admin / admin123</span> (change it in env for production).</div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('loginBtn').addEventListener('click', async () => {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const msg = document.getElementById('loginMsg');
  msg.textContent = 'Signing in...';
  try {
    await fetchJSON('/api/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    window.location.href = '/';
  } catch (err) {
    msg.className = 'text-sm text-rose-700';
    msg.textContent = err.message || 'Login failed';
  }
});
</script>
{% endblock %}
