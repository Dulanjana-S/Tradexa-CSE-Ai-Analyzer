{% extends "base.html" %}
{% block content %}

<div class="flex flex-col gap-6">
  <section class="card">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold">Announcements</h1>
        <div class="text-sm text-slate-600 mt-1">
          Recent disclosures and notices (synthetic demo feed).
        </div>
      </div>

      <div class="flex items-center gap-2">
        <input id="symFilter" class="input w-48" placeholder="Filter by symbol" />
        <button id="filterBtn" class="btn">Filter</button>
        <button id="clearBtn" class="btnSecondary">Clear</button>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="flex items-center justify-between">
      <div class="cardLabel">Latest</div>
      <div class="text-sm text-slate-600" id="countLbl">—</div>
    </div>

    <div id="annList" class="mt-4 space-y-3"></div>
  </section>
</div>

{% endblock %}

{% block scripts %}
<script>
  (function () {
    const list = document.getElementById("annList");
    const countLbl = document.getElementById("countLbl");
    const symFilter = document.getElementById("symFilter");

    function badge(type) {
      const map = {
        "Financial": "badgeIndigo",
        "Corporate Action": "badgeEmerald",
        "Press Release": "badgeSlate",
        "Board Decision": "badgeAmber",
        "Disclosure": "badgeRose",
      };
      return map[type] || "badgeSlate";
    }

    function render(anns) {
      list.innerHTML = "";
      anns.forEach(a => {
        const div = document.createElement("div");
        div.className = "rounded-xl border border-slate-200 bg-white p-4";
        div.innerHTML = `
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <div class="flex items-center gap-2">
                <a class="link font-semibold" href="/stock/${encodeURIComponent(a.symbol)}">${escapeHtml(a.symbol)}</a>
                <span class="${badge(a.type)}">${escapeHtml(a.type)}</span>
                <span class="text-xs text-slate-500">${escapeHtml(a.date)}</span>
              </div>
              <div class="mt-1 text-sm text-slate-800">${escapeHtml(a.title)}</div>
            </div>
            <a class="text-xs text-slate-500 hover:text-slate-900" href="${a.url || "#"}">View</a>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function load() {
      const params = new URLSearchParams();
      const s = (symFilter.value || "").trim();
      if (s) params.set("symbol", s);

      fetchJSON("/api/announcements?" + params.toString()).then((resp) => {
        countLbl.textContent = `${resp.count} announcements`;
        render(resp.announcements || []);
      });
    }

    document.getElementById("filterBtn").addEventListener("click", load);
    document.getElementById("clearBtn").addEventListener("click", () => {
      symFilter.value = "";
      load();
    });

    load();
  })();
</script>
{% endblock %}
