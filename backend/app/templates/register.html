{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto card">
  <div class="cardLabel">Register</div>
  <h1 class="text-2xl font-semibold mt-1">Create user account</h1>
  <div class="mt-5 space-y-3">
    <input id="displayName" class="w-full rounded-xl border border-slate-200 px-3 py-2" placeholder="Display name" />
    <input id="username" class="w-full rounded-xl border border-slate-200 px-3 py-2" placeholder="Username" />
    <input id="email" class="w-full rounded-xl border border-slate-200 px-3 py-2" placeholder="Email (optional)" />
    <input id="password" type="password" class="w-full rounded-xl border border-slate-200 px-3 py-2" placeholder="Password" />
    <button id="registerBtn" class="btn w-full">Create account</button>
    <div id="registerMsg" class="text-sm"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('registerBtn').addEventListener('click', async () => {
  const payload = {
    username: document.getElementById('username').value,
    password: document.getElementById('password').value,
    display_name: document.getElementById('displayName').value,
    email: document.getElementById('email').value,
  };
  const msg = document.getElementById('registerMsg');
  msg.textContent = 'Creating account...';
  try {
    await fetchJSON('/api/auth/register', { method: 'POST', body: JSON.stringify(payload) });
    msg.className = 'text-sm text-emerald-700';
    msg.textContent = 'Account created. You can now log in.';
  } catch (err) {
    msg.className = 'text-sm text-rose-700';
    msg.textContent = err.message || 'Register failed';
  }
});
</script>
{% endblock %}
