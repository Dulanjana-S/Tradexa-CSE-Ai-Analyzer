services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cse
      POSTGRES_PASSWORD: cse
      POSTGRES_DB: cse_ai
    ports:
      - "5432:5432"
    volumes:
      - cse_ai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cse -d cse_ai"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATA_PROVIDER: ${DATA_PROVIDER:-hybrid}
      DB_CACHE_ENABLED: ${DB_CACHE_ENABLED:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://cse:cse@db:5432/cse_ai}
      MODEL_DIR: ${MODEL_DIR:-models}
      ALLOW_PREDICTION_FALLBACK: ${ALLOW_PREDICTION_FALLBACK:-false}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:8000}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}
      ALLOW_PASSWORD_RESET_PREVIEW: ${ALLOW_PASSWORD_RESET_PREVIEW:-false}
    volumes:
      - ./backend/models:/app/models
      - ./backend/data:/app/data

volumes:
  cse_ai_pgdata:
